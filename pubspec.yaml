name: mvhs_football
description: "MVHS Diablos Football - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Navigation
  go_router: ^14.8.1
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.5.1
  firebase_crashlytics: ^4.3.3
  firebase_storage: ^12.4.4
  cloud_functions: ^5.2.5
  # UI
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  # Local storage
  shared_preferences: ^2.3.4
  # E2E encryption
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  # Voice input
  speech_to_text: ^7.0.0
  # Biometric auth
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
